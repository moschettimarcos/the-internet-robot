name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Robot Framework Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Chrome browser
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser
        
    - name: Install ChromeDriver
      run: |
        sudo apt-get install -y chromium-chromedriver
        
    - name: Run Robot Framework Tests
      run: |
        robot --outputdir results --variable HEADLESS:true --variable BROWSER:chrome tests/
      continue-on-error: true
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: results/
        retention-days: 30
        
    - name: Upload screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshots
        path: screenshots/
        retention-days: 30
        
    - name: Generate test report
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f results/output.xml ]; then
          python -c "
import xml.etree.ElementTree as ET
tree = ET.parse('results/output.xml')
root = tree.getroot()
total = int(root.attrib.get('total', 0))
passed = int(root.attrib.get('pass', 0))
failed = int(root.attrib.get('fail', 0))
skipped = int(root.attrib.get('skip', 0))
print(f'- Total Tests: {total}')
print(f'- Passed: {passed}')
print(f'- Failed: {failed}')
print(f'- Skipped: {skipped}')
" >> $GITHUB_STEP_SUMMARY
        fi
        
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pylint
        
    - name: Run Black formatter check
      run: |
        black --check pages/
        
    - name: Run Flake8 linter
      run: |
        flake8 pages/ --max-line-length=100 --ignore=E501,W503
        
    - name: Run Pylint
      run: |
        pylint pages/ --disable=too-few-public-methods,too-many-arguments
      continue-on-error: true
